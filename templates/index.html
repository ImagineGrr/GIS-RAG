<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoAI — Government GIS Assistant</title>
    <meta name="description" content="Natural language GIS chatbot for querying government building data in Chhattisgarh using PostGIS and AI.">
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<div class="app">

    <!-- Header -->
    <header class="header">
        <div class="header-inner">
            <div class="header-brand">
                <div class="brand-logo">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polygon points="3 11 22 2 13 21 11 13 3 11"></polygon>
                    </svg>
                </div>
                <span class="brand-name">GeoAI</span>
                <span class="brand-sep">·</span>
                <span class="brand-sub">Chhattisgarh GIS</span>
            </div>
            <div class="header-actions">
                <span class="model-badge">
                    <span class="model-dot"></span>
                    Qwen + PostGIS
                </span>
            </div>
        </div>
    </header>

    <!-- Conversation -->
    <main class="conversation" id="chatBox">

        <!-- Welcome -->
        <div class="welcome" id="welcomeScreen">
            <div class="welcome-icon">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <polygon points="3 11 22 2 13 21 11 13 3 11"></polygon>
                </svg>
            </div>
            <h2 class="welcome-title">GeoAI Assistant</h2>
            <p class="welcome-sub">Ask anything about government buildings across Chhattisgarh in English or Hindi.</p>
            <div class="starters">
                <button class="starter-btn" onclick="useQuestion('How many buildings are in Raipur?')">
                    <span class="starter-icon">🏛️</span>
                    <span>How many buildings are in Raipur?</span>
                </button>
                <button class="starter-btn" onclick="useQuestion('Show buildings in poor condition in Durg')">
                    <span class="starter-icon">⚠️</span>
                    <span>Buildings in poor condition in Durg</span>
                </button>
                <button class="starter-btn" onclick="useQuestion('Find government owned offices in Bilaspur')">
                    <span class="starter-icon">🔍</span>
                    <span>Government offices in Bilaspur</span>
                </button>
                <button class="starter-btn" onclick="useQuestion('How many buildings per district?')">
                    <span class="starter-icon">📊</span>
                    <span>Buildings count per district</span>
                </button>
                <button class="starter-btn" onclick="useQuestion('Buildings within 5 km of Bastar')">
                    <span class="starter-icon">📍</span>
                    <span>Buildings within 5 km of Bastar</span>
                </button>
                <button class="starter-btn" onclick="useQuestion('रायपुर में कितने भवन हैं?')">
                    <span class="starter-icon">🇮🇳</span>
                    <span>रायपुर में कितने भवन हैं?</span>
                </button>
            </div>
        </div>

    </main>

    <!-- Input -->
    <footer class="input-area">
        <div class="input-wrap">
            <div class="input-box" id="inputBox">
                <textarea
                    id="questionInput"
                    placeholder="Ask about government buildings..."
                    rows="1"
                    maxlength="500"
                    oninput="autoResize(this)"
                    onkeydown="handleEnter(event)"
                    autocomplete="off"
                ></textarea>
                <button id="sendBtn" onclick="sendQuestion()" title="Send message" aria-label="Send">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                    </svg>
                </button>
            </div>
            <p class="input-footer">Supports English and Hindi &nbsp;·&nbsp; Powered by Qwen + PostGIS</p>
        </div>
    </footer>

</div>

<script src="/static/script.js"></script>

</body>
</html>
